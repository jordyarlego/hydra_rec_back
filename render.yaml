services:
  - type: web
    name: hydrarec
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Render free = 512MB. Limita concorrência (evita spike de tráfego),
    # encolhe keep-alive (libera socket+memória rápido) e recicla processo
    # a cada 5000 requests (corta acúmulo lento). Apenas 1 worker.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --limit-concurrency 40 --timeout-keep-alive 5 --limit-max-requests 5000
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: report-photos
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: PUSH_TEST_TOKEN
        sync: false
